<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Bound - Lompat!</title>

  <!-- Bootstrap & Font -->
  <link href="../bootstrap5/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
  <link href="../fontawesome/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary: #f43f5e;
      --secondary: #3b82f6;
      --accent: #fde047;
      --glass-bg: rgba(255, 255, 255, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0f172a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .btn-back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 10px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      z-index: 100;
    }

    .btn-back-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-5px);
      color: white;
    }

    .game-header {
      margin-top: 20px;
      text-align: center;
    }

    .game-header h1 {
      font-weight: 900;
      font-size: 2.5rem;
      background: linear-gradient(to right, var(--accent), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .scoreboard {
      display: flex;
      gap: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      padding: 10px 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .score-item span {
      color: var(--accent);
      font-weight: 900;
    }

    #game-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 350px;
      margin-top: 20px;
      background: linear-gradient(to bottom, #38bdf8 0%, #bae6fd 70%, #16a34a 70%, #15803d 100%);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
      border: 4px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    /* Clouds Parallax */
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50px;
      animation: floatClouds linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
    }

    @keyframes floatClouds {
      from {
        left: 100%;
      }

      to {
        left: -200px;
      }
    }

    #player {
      position: absolute;
      bottom: 105px;
      /* Above the grass line (70% of 350 = 245, grass is 105px tall) */
      left: 60px;
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, var(--primary), #9f1239);
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(244, 63, 94, 0.5), inset 0 -5px 10px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    /* Eye for character */
    #player::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      box-shadow: inset -2px -2px 0 #000;
    }

    .jumping {
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .falling {
      transition: bottom 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53);
    }

    .obstacle {
      position: absolute;
      bottom: 105px;
      width: 30px;
      min-height: 50px;
      background: linear-gradient(to right, #451a03, #78350f);
      border-radius: 5px 5px 0 0;
      animation: moveObstacle linear forwards;
      z-index: 5;
    }

    /* Spikes on obstacle */
    .obstacle::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 0;
      width: 100%;
      height: 10px;
      background: repeating-linear-gradient(45deg,
          #78350f,
          #78350f 5px,
          transparent 5px,
          transparent 10px);
    }

    @keyframes moveObstacle {
      from {
        right: -50px;
      }

      to {
        right: 100%;
      }
    }

    #controls {
      margin-top: 30px;
      display: flex;
      gap: 20px;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 15px 40px;
      font-size: 1.3rem;
      border-radius: 50px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
    }

    .btn-action:active {
      transform: translateY(2px);
    }

    .btn-play {
      background: linear-gradient(45deg, var(--secondary), #0284c7);
      border: none;
    }

    .btn-play:hover {
      background: linear-gradient(45deg, #60a5fa, var(--secondary));
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      font-size: 3rem;
      color: var(--primary);
      text-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
      font-weight: 900;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <a class="btn-back-link" href="../aplikasi.html">
    <i class="fas fa-arrow-left me-2"></i>Kembali
  </a>

  <div class="game-header">
    <h1>Sky Bound</h1>
    <div class="scoreboard">
      <div class="score-item">SCORE: <span id="score">0</span></div>
      <div class="score-item text-secondary">|</div>
      <div class="score-item">BEST: <span id="highscore">0</span></div>
    </div>
  </div>

  <div id="game-container">
    <!-- Parallax Clouds -->
    <div class="cloud" style="width: 100px; height: 30px; top: 30px; animation-duration: 25s; opacity: 0.6;"></div>
    <div class="cloud" style="width: 150px; height: 40px; top: 80px; animation-duration: 15s; opacity: 0.8;"></div>

    <div id="player"></div>

    <div class="overlay" id="gameOverOverlay">
      <h2>BOONKED!</h2>
      <button class="btn-action btn-play" onclick="startGame()"><i class="fas fa-redo me-2"></i>Play Again</button>
    </div>
  </div>

  <div id="controls">
    <button class="btn-action btn-play" id="startBtn" onclick="startGame()"><i class="fas fa-play me-2"></i>Start
      Room</button>
    <button class="btn-action" id="jumpBtn" onclick="jump()"><i class="fas fa-angle-double-up me-2"></i>Jump</button>
  </div>

  <!-- Suara (Keeping existing audio logic) -->
  <audio id="jumpSound" src="https://www.soundjay.com/button/sounds/button-16.mp3" preload="auto"></audio>
  <audio id="hitSound" src="https://www.soundjay.com/button/sounds/button-10.mp3" preload="auto"></audio>

  <script src="../bootstrap5/js/bootstrap.bundle.min.js"></script>
  <script>
    const player = document.getElementById("player");
    const game = document.getElementById("game-container");
    const scoreDisplay = document.getElementById("score");
    const highscoreDisplay = document.getElementById("highscore");
    const jumpSound = document.getElementById("jumpSound");
    const hitSound = document.getElementById("hitSound");
    const overlay = document.getElementById("gameOverOverlay");
    const startBtn = document.getElementById("startBtn");

    let isJumping = false;
    let gameInterval;
    let obstacleInterval;
    let scoreInterval;
    let speed = 2000;
    let score = 0;
    let highscore = localStorage.getItem("varchar_jump_highscore") || 0;
    highscoreDisplay.textContent = highscore;
    let gameActive = false;

    const BASE_BOTTOM = 105;
    const JUMP_HEIGHT = 280;

    function jump() {
      if (isJumping || !gameActive) return;
      isJumping = true;
      jumpSound.currentTime = 0;
      jumpSound.play().catch(e => console.log('Audio error:', e));

      player.classList.remove("falling");
      player.classList.add("jumping");
      player.style.bottom = JUMP_HEIGHT + "px";

      setTimeout(() => {
        player.classList.remove("jumping");
        player.classList.add("falling");
        player.style.bottom = BASE_BOTTOM + "px";

        setTimeout(() => {
          isJumping = false;
          player.classList.remove("falling");
        }, 300);

      }, 400); // Wait at peak
    }

    function createObstacle() {
      if (!gameActive) return;

      const obstacle = document.createElement("div");
      obstacle.classList.add("obstacle");

      // Randomize height slightly for variation using JS instead of CSS
      const height = 40 + Math.random() * 30;
      obstacle.style.height = height + "px";

      obstacle.style.animationDuration = (speed / 1000) + "s";
      game.appendChild(obstacle);

      const move = setInterval(() => {
        if (!gameActive) {
          clearInterval(move);
          return;
        }

        const obstacleCol = obstacle.getBoundingClientRect();
        const playerCol = player.getBoundingClientRect();

        // Adjust hitbox slightly for visual overlapping forgiveness
        const forgiveness = 8;

        if (
          obstacleCol.left + forgiveness < playerCol.right &&
          obstacleCol.right - forgiveness > playerCol.left &&
          obstacleCol.top + forgiveness < playerCol.bottom &&
          obstacleCol.bottom - forgiveness > playerCol.top
        ) {
          // Collision!
          hitSound.currentTime = 0;
          hitSound.play().catch(e => console.log('Audio error:', e));
          gameOver();
        }

        if (obstacleCol.right < 0) {
          obstacle.remove();
          clearInterval(move);
        }
      }, 10);
    }

    function startGame() {
      // Clean up previous obstacles
      document.querySelectorAll('.obstacle').forEach(obs => obs.remove());

      overlay.classList.remove('active');
      startBtn.style.display = 'none';

      score = 0;
      speed = 1800; // start slightly faster
      scoreDisplay.textContent = score;
      gameActive = true;
      isJumping = false;
      player.style.bottom = BASE_BOTTOM + "px";

      clearInterval(gameInterval);
      clearInterval(obstacleInterval);
      clearInterval(scoreInterval);

      gameInterval = setInterval(() => {
        speed = Math.max(speed * 0.98, 800); // Cap max speed
        // Update existing css animation speeds? difficult mid-flight, so we just spawn them faster
      }, 2000);

      // Recursive spawner to handle changing speeds smoothly
      function spawnLoop() {
        if (!gameActive) return;
        createObstacle();
        obstacleInterval = setTimeout(spawnLoop, speed + (Math.random() * 500)); // Add slight randomness to gap
      }
      spawnLoop();

      scoreInterval = setInterval(() => {
        if (gameActive) {
          score++;
          scoreDisplay.textContent = score;
          if (score > highscore) {
            highscore = score;
            highscoreDisplay.textContent = highscore;
          }
        }
      }, 100);
    }

    function gameOver() {
      gameActive = false;
      clearInterval(gameInterval);
      clearTimeout(obstacleInterval);
      clearInterval(scoreInterval);

      player.style.animation = "none";

      if (score > highscore) {
        localStorage.setItem("varchar_jump_highscore", score);
      }

      overlay.classList.add('active');
    }

    // Controls
    document.addEventListener("keydown", function (e) {
      if (e.code === "Space" || e.code === "ArrowUp" || e.type === "touchstart") {
        e.preventDefault(); // Prevent scrolling
        if (!gameActive && overlay.classList.contains('active')) {
          startGame();
        } else {
          jump();
        }
      }
    });

    // Mobile TAP anywhere to jump
    document.body.addEventListener("touchstart", (e) => {
      // Only jump if tapped outside of buttons to prevent double firing on Restart
      if (!e.target.closest('button') && !e.target.closest('a')) {
        if (gameActive) jump();
      }
    });

  </script>
</body>

</html>
