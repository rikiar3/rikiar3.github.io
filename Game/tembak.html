<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Block Blast - Tembak</title>

  <!-- Bootstrap CSS -->
  <link href="../bootstrap5/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Geo&family=Outfit:wght@400;700&display=swap" rel="stylesheet" />
  <link href="../fontawesome/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #030014;
      --neon-cyan: #00f3ff;
      --neon-magenta: #ff00ea;
      --neon-yellow: #fffb00;
    }

    body {
      margin: 0;
      background: var(--bg-color);
      color: white;
      font-family: 'Outfit', sans-serif;
      text-align: center;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 234, 0.05), transparent 25%);
    }

    .btn-back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--neon-cyan);
      text-decoration: none;
      font-weight: 600;
      background: rgba(0, 243, 255, 0.05);
      padding: 8px 15px;
      border: 1px solid var(--neon-cyan);
      border-radius: 5px;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
      z-index: 100;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-back-link:hover {
      background: var(--neon-cyan);
      color: var(--bg-color);
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    .game-header {
      margin-top: 30px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Geo', sans-serif;
      font-size: 4rem;
      margin: 0;
      color: #fff;
      text-shadow:
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px var(--neon-magenta),
        0 0 40px var(--neon-magenta);
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .score-board {
      display: inline-block;
      padding: 5px 20px;
      border: 1px solid var(--neon-cyan);
      background: rgba(0, 243, 255, 0.1);
      border-radius: 20px;
      margin-top: 10px;
      font-size: 1.2rem;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
    }

    .canvas-container {
      position: relative;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 0, 234, 0.3);
      box-shadow:
        inset 0 0 20px rgba(255, 0, 234, 0.1),
        0 0 20px rgba(0, 243, 255, 0.1);
    }

    canvas {
      background: #000;
      display: block;
      border-radius: 5px;
    }

    .controls-panel {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    select {
      padding: 10px 15px;
      font-size: 1rem;
      border-radius: 5px;
      border: 1px solid var(--neon-cyan);
      background: rgba(0, 0, 0, 0.5);
      color: var(--neon-cyan);
      font-family: 'Outfit', sans-serif;
      outline: none;
    }

    select:focus {
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    .btn-custom {
      padding: 12px 25px;
      font-size: 1.1rem;
      border-radius: 5px;
      border: none;
      color: var(--bg-color);
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background-color: var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan);
      border: 1px solid transparent;
    }

    .btn-start:hover {
      background-color: #fff;
      box-shadow: 0 0 20px #fff, 0 0 30px var(--neon-cyan);
    }

    .btn-start.active {
      background-color: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: none;
    }

    .gamepad {
      display: flex;
      width: 100%;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-control {
      flex: 1;
      background-color: rgba(255, 0, 234, 0.2);
      border: 1px solid var(--neon-magenta);
      color: var(--neon-magenta);
      padding: 15px 0;
      border-radius: 8px;
    }

    .btn-control.shoot {
      flex: 2;
      background-color: rgba(0, 243, 255, 0.2);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }

    .btn-control:active {
      transform: scale(0.95);
      background-color: var(--neon-magenta);
      color: var(--bg-color);
      box-shadow: 0 0 15px var(--neon-magenta);
    }

    .btn-control.shoot:active {
      background-color: var(--neon-cyan);
      color: var(--bg-color);
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 0, 20, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      border-radius: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      font-family: 'Geo', sans-serif;
      font-size: 4rem;
      color: var(--neon-magenta);
      text-shadow: 0 0 20px var(--neon-magenta);
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

  <a class="btn-back-link" href="../aplikasi.html">
    <i class="fas fa-arrow-left me-2"></i>Kembali
  </a>

  <div class="game-header">
    <h1><i class="fas fa-meteor me-2" style="font-size:3rem"></i>Block Blast</h1>
    <div class="score-board">
      SCORE: <span id="scoreDisplay">0</span>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="overlay" id="gameOverOverlay">
      <h2>GAME OVER</h2>
      <p class="mb-4 text-secondary fs-5" style="font-family: 'Outfit'">Final Score: <strong id="finalScore"
          class="text-white">0</strong></p>
      <button class="btn-custom btn-start" onclick="startGame()">Restart Mission</button>
    </div>
  </div>

  <div class="controls-panel">
    <div class="settings-row">
      <select id="level">
        <option value="1">Speed: Slow</option>
        <option value="2" selected>Speed: Normal</option>
        <option value="3">Speed: Fast</option>
      </select>
      <button id="start-btn" class="btn-custom btn-start" onclick="startGame()">▶ Play</button>
    </div>

    <!-- On screen Gamepad -->
    <div class="gamepad">
      <button class="btn-custom btn-control" onpointerdown="startMove('left')" onpointerup="stopMove()"
        onpointerleave="stopMove()"><i class="fas fa-chevron-left"></i></button>
      <button class="btn-custom btn-control shoot" onclick="shoot()">FIRE</button>
      <button class="btn-custom btn-control" onpointerdown="startMove('right')" onpointerup="stopMove()"
        onpointerleave="stopMove()"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="../bootstrap5/js/bootstrap.bundle.min.js"></script>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const overlay = document.getElementById("gameOverOverlay");
    const startBtn = document.getElementById("start-btn");

    const player = {
      x: 180,
      y: 450,
      width: 40,
      height: 25,
      speed: 12
    };

    let bullets = [];
    let blocks = [];
    let particles = [];
    let score = 0;
    let gameOver = false;
    let blockSpeed = 1;
    let blockInterval;
    let animationFrame;
    let moveDirection = null;

    // Movement loop for touch controls
    setInterval(() => {
      if (!gameOver) {
        if (moveDirection === 'left') moveLeft();
        if (moveDirection === 'right') moveRight();
      }
    }, 20);

    function startMove(dir) {
      moveDirection = dir;
    }

    function stopMove() {
      moveDirection = null;
    }

    function resetGame() {
      bullets = [];
      blocks = [];
      particles = [];
      score = 0;
      gameOver = false;
      player.x = 180;
      scoreDisplay.textContent = score;
      overlay.classList.remove('active');
      startBtn.classList.add('active');
      startBtn.textContent = 'Playing...';
    }

    function startGame() {
      cancelAnimationFrame(animationFrame);
      clearInterval(blockInterval);
      resetGame();

      const level = parseInt(document.getElementById("level").value);
      blockSpeed = level === 1 ? 0.8 : level === 2 ? 1.5 : 2.5;

      const spawnRate = level === 1 ? 2000 : level === 2 ? 1500 : 1000;
      blockInterval = setInterval(spawnBlock, spawnRate);
      draw();
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 5,
          life: 1.0,
          color: color
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.05;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
        ctx.globalAlpha = 1.0;
      });
    }

    function drawSpaceship() {
      // Glow
      ctx.shadowBlur = 10;
      ctx.shadowColor = "#00f3ff";

      ctx.fillStyle = "#00f3ff";

      // Ship body (triangle-ish)
      ctx.beginPath();
      ctx.moveTo(player.x + player.width / 2, player.y); // tip
      ctx.lineTo(player.x + player.width, player.y + player.height); // right wing
      ctx.lineTo(player.x + player.width / 2, player.y + player.height - 5); // inner thruster
      ctx.lineTo(player.x, player.y + player.height); // left wing
      ctx.closePath();
      ctx.fill();

      // Reset glow
      ctx.shadowBlur = 0;

      // Thruster flame random effect
      if (Math.random() > 0.3) {
        ctx.fillStyle = "#fffb00";
        ctx.beginPath();
        ctx.moveTo(player.x + player.width / 2 - 5, player.y + player.height - 5);
        ctx.lineTo(player.x + player.width / 2 + 5, player.y + player.height - 5);
        ctx.lineTo(player.x + player.width / 2, player.y + player.height + 5 + Math.random() * 10);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawBullets() {
      ctx.shadowBlur = 15;
      ctx.shadowColor = "#fffb00";
      ctx.fillStyle = "#fffb00";
      bullets.forEach(b => {
        ctx.beginPath();
        ctx.ellipse(b.x + 2, b.y + 5, 3, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
    }

    function drawBlocks() {
      ctx.font = "bold 16px Outfit";
      ctx.textAlign = "center";
      blocks.forEach(b => {
        // Block glow
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ff00ea";

        ctx.fillStyle = "rgba(255,0,234,0.2)";
        ctx.strokeStyle = "#ff00ea";
        ctx.lineWidth = 2;

        ctx.fillRect(b.x, b.y, b.size, b.size);
        ctx.strokeRect(b.x, b.y, b.size, b.size);

        ctx.shadowBlur = 0;

        ctx.fillStyle = "white";
        ctx.fillText(b.hp, b.x + b.size / 2, b.y + b.size / 2 + 6);
      });
    }

    function updateBullets() {
      bullets.forEach(b => b.y -= 8);
      bullets = bullets.filter(b => b.y > 0);
    }

    function updateBlocks() {
      blocks.forEach(b => {
        b.y += blockSpeed;
        if (b.y + b.size >= canvas.height && !gameOver) {
          triggerGameOver();
        }
      });
    }

    function spawnBlock() {
      if (gameOver) return;
      const size = 50;
      const x = Math.floor(Math.random() * (canvas.width / size)) * size;
      // Difficulty scales hp
      const baseHp = score > 10 ? 3 : 1;
      const hp = Math.floor(Math.random() * 3) + baseHp;
      blocks.push({ x, y: -size, size, hp });
    }

    function checkCollisions() {
      bullets.forEach((b, bi) => {
        blocks.forEach((blk, bi2) => {
          if (
            b.x < blk.x + blk.size &&
            b.x + 4 > blk.x &&
            b.y < blk.y + blk.size &&
            b.y + 10 > blk.y
          ) {
            createExplosion(b.x, b.y, "#fffb00");
            bullets.splice(bi, 1);
            blk.hp--;
            if (blk.hp <= 0) {
              createExplosion(blk.x + blk.size / 2, blk.y + blk.size / 2, "#ff00ea");
              blocks.splice(bi2, 1);
              score++;
              scoreDisplay.textContent = score;
            }
          }
        });
      });
    }

    function triggerGameOver() {
      gameOver = true;
      clearInterval(blockInterval);
      document.getElementById("finalScore").textContent = score;
      overlay.classList.add('active');
      startBtn.classList.remove('active');
      startBtn.textContent = '▶ Play';
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(0, 243, 255, 0.05)";
      ctx.lineWidth = 1;
      const gridSpacing = 50;

      // Move grid slowly downwards for illusion of speed
      const offset = (Date.now() / 20) % gridSpacing;

      ctx.beginPath();
      for (let x = 0; x <= canvas.width; x += gridSpacing) {
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
      }
      for (let y = offset; y <= canvas.height; y += gridSpacing) {
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
      }
      ctx.stroke();
    }

    function draw() {
      if (gameOver) {
        // Keep drawing static last frame so it doesn't just disappear
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawBlocks();
        drawSpaceship();
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawGrid();

      updateBullets();
      updateBlocks();
      updateParticles();
      checkCollisions();

      drawBullets();
      drawBlocks();
      drawParticles();
      drawSpaceship();

      animationFrame = requestAnimationFrame(draw);
    }

    function moveLeft() {
      if (player.x > 0) player.x -= player.speed;
    }

    function moveRight() {
      if (player.x + player.width < canvas.width) player.x += player.speed;
    }

    function shoot() {
      if (gameOver) return;
      // Shoot from center of ship
      bullets.push({ x: player.x + player.width / 2 - 2, y: player.y });
    }

    // Keyboard controls
    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.code] = true;
      if (e.code === "Space") shoot();
    });

    document.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    // Keyboard smooth movement loop
    setInterval(() => {
      if (!gameOver) {
        if (keys["ArrowLeft"] || keys["KeyA"]) moveLeft();
        if (keys["ArrowRight"] || keys["KeyD"]) moveRight();
      }
    }, 20);

    // Initial draw
    drawGrid();
    drawSpaceship();

  </script>
</body>

</html>
