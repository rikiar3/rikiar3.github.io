<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyber Dodge - Hindari Balok!</title>

  <!-- Bootstrap CSS -->
  <link href="../bootstrap5/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <!-- Font Awesome -->
  <link href="../fontawesome/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(15, 23, 42, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --primary: #0ea5e9;
      --accent: #f43f5e;
      --neon-glow: 0 0 15px rgba(14, 165, 233, 0.5);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 30px 10px;
      overflow-x: hidden;
      background-image:
        linear-gradient(rgba(11, 15, 25, 0.9), rgba(11, 15, 25, 0.9)),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(14, 165, 233, 0.05) 40px, rgba(14, 165, 233, 0.05) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(14, 165, 233, 0.05) 40px, rgba(14, 165, 233, 0.05) 41px);
    }

    .btn-back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 10px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      z-index: 100;
    }

    .btn-back-link:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transform: translateX(-5px);
    }

    .game-wrapper {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(14, 165, 233, 0.1);
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .score-board {
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .score-board span {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fde047;
      text-shadow: 0 0 10px rgba(253, 224, 71, 0.5);
    }

    .canvas-container {
      position: relative;
      padding: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      border: 1px solid var(--primary);
      box-shadow: var(--neon-glow);
    }

    canvas {
      display: block;
      background: #000;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      height: auto;
      aspect-ratio: 4/5;
    }

    .btn-action {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 30px;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(14, 165, 233, 0.6);
      background: #0284c7;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .btn-dir {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 15px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-dir:active {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(0.9);
    }

    #gameOverOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 15, 25, 0.9);
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 20;
    }

    #gameOverOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    #gameOverOverlay h2 {
      font-size: 3rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

  <a class="btn-back-link" href="../aplikasi.html">
    <i class="fas fa-arrow-left me-2"></i>Kembali
  </a>

  <div class="game-wrapper">
    <h1>Cyber Dodge</h1>

    <div class="score-board">
      <i class="fas fa-trophy me-2 text-warning"></i>
      <span id="scoreDisplay">0</span>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas" width="400" height="500"></canvas>

      <div id="gameOverOverlay">
        <h2>CRASHED!</h2>
        <p class="mb-4 text-secondary fs-4">Final Score: <strong id="finalScore" class="text-white">0</strong></p>
        <button class="btn-action" onclick="startGame()">Play Again</button>
      </div>
    </div>

    <div class="mt-4">
      <button id="start-btn" class="btn-action" onclick="startGame()"><i class="fas fa-play me-2"></i>Start
        Engine</button>
    </div>

    <div class="controls-row">
      <div class="btn-dir" id="left-btn"><i class="fas fa-chevron-left"></i></div>
      <div class="btn-dir" id="right-btn"><i class="fas fa-chevron-right"></i></div>
    </div>
  </div>

  <script src="../bootstrap5/js/bootstrap.bundle.min.js"></script>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const overlay = document.getElementById("gameOverOverlay");
    const finalScore = document.getElementById("finalScore");
    const startBtn = document.getElementById("start-btn");

    const player = {
      x: 180,
      y: 450,
      width: 40,
      height: 20,
      speed: 6,
      color: '#38bdf8'
    };

    let blocks = [];
    let score = 0;
    let gameOver = false;
    let blockSpeed = 3;
    let animationFrame;
    let gameActive = false;

    function resetGame() {
      blocks = [];
      score = 0;
      gameOver = false;
      gameActive = true;
      blockSpeed = 3;
      player.x = 180;
      scoreDisplay.textContent = score;
      overlay.classList.remove('active');
      startBtn.disabled = true;
    }

    function startGame() {
      cancelAnimationFrame(animationFrame);
      resetGame();
      draw();
    }

    function drawPlayer() {
      ctx.shadowBlur = 15;
      ctx.shadowColor = player.color;
      ctx.fillStyle = player.color;
      // Draw sleek ship-like shape
      ctx.beginPath();
      ctx.moveTo(player.x + player.width / 2, player.y - 10);
      ctx.lineTo(player.x + player.width, player.y + player.height);
      ctx.lineTo(player.x, player.y + player.height);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawBlocks() {
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#f43f5e';
      ctx.fillStyle = "#f43f5e";
      blocks.forEach(block => {
        ctx.fillRect(block.x, block.y, block.width, block.height);
      });
      ctx.shadowBlur = 0;
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(14, 165, 233, 0.1)";
      ctx.lineWidth = 1;
      const offset = (Date.now() / 20) % 50;
      for (let y = offset; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function updateBlocks() {
      blocks.forEach(block => {
        block.y += blockSpeed;
      });

      blocks = blocks.filter(block => block.y < canvas.height);

      if (Math.random() < 0.04) {
        const w = 40 + Math.random() * 40;
        blocks.push({
          x: Math.random() * (canvas.width - w),
          y: -20,
          width: w,
          height: 20
        });
      }
    }

    function checkCollision() {
      // Adjusted collision box for the triangle shape
      const px = player.x + 5;
      const py = player.y;
      const pw = player.width - 10;
      const ph = player.height;

      for (let block of blocks) {
        if (
          px < block.x + block.width &&
          px + pw > block.x &&
          py < block.y + block.height &&
          py + ph > block.y
        ) {
          gameOver = true;
        }
      }
    }

    function draw() {
      if (!gameActive) {
        // Initial drawing before game starts
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        drawPlayer();
        return;
      }

      if (gameOver) {
        finalScore.textContent = score;
        overlay.classList.add('active');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-redo me-2"></i>Restart';
        gameActive = false;
        return;
      }

      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      drawPlayer();
      drawBlocks();
      updateBlocks();
      checkCollision();

      score++;
      if (score % 10 === 0) {
        scoreDisplay.textContent = score;
      }

      if (score % 600 === 0) blockSpeed += 0.5;

      animationFrame = requestAnimationFrame(draw);
    }

    function moveLeft() {
      if (!gameActive || gameOver) return;
      if (player.x > 0) player.x -= player.speed * 2;
    }

    function moveRight() {
      if (!gameActive || gameOver) return;
      if (player.x + player.width < canvas.width) player.x += player.speed * 2;
    }

    // Controls
    let leftInterval, rightInterval;

    const btnLeft = document.getElementById("left-btn");
    const btnRight = document.getElementById("right-btn");

    btnLeft.addEventListener("mousedown", () => leftInterval = setInterval(moveLeft, 20));
    btnLeft.addEventListener("touchstart", (e) => { e.preventDefault(); leftInterval = setInterval(moveLeft, 20); });
    btnLeft.addEventListener("mouseup", () => clearInterval(leftInterval));
    btnLeft.addEventListener("touchend", () => clearInterval(leftInterval));
    btnLeft.addEventListener("mouseleave", () => clearInterval(leftInterval));

    btnRight.addEventListener("mousedown", () => rightInterval = setInterval(moveRight, 20));
    btnRight.addEventListener("touchstart", (e) => { e.preventDefault(); rightInterval = setInterval(moveRight, 20); });
    btnRight.addEventListener("mouseup", () => clearInterval(rightInterval));
    btnRight.addEventListener("touchend", () => clearInterval(rightInterval));
    btnRight.addEventListener("mouseleave", () => clearInterval(rightInterval));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") moveLeft();
      if (e.key === "ArrowRight") moveRight();
    });

    // Draw initial screen
    draw();
  </script>
</body>

</html>
