<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Filter Saham 5% - Varchar</title>

  <!-- Bootstrap CSS -->
  <link href="bootstrap5/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link href="fontawesome/css/all.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --excel-green: #107c41;
      --excel-hover: #185c37;
      --bg-light: #f3f2f1;
      --border-color: #e1dfdd;
      --text-main: #323130;
      --cell-bg: #ffffff;
      --header-bg: #f8f9fa;
      --cell-hover: #f3f2f1;
      --cell-border: #d2d0ce;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top Ribbon / Header */
    .ribbon {
      background-color: var(--excel-green);
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .ribbon-brand {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ribbon-brand i {
      font-size: 1.5rem;
    }

    .btn-ribbon {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 4px;
      padding: 5px 15px;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-ribbon:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    /* Info Bar & Toolbar Area */
    .info-bar {
      background-color: #fff9e6;
      /* light yellow warning/info bg typical in office apps */
      border-bottom: 1px solid var(--border-color);
      padding: 10px 20px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #795e00;
    }

    .toolbar {
      background-color: white;
      border-bottom: 1px solid var(--border-color);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 9;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .file-input-wrapper input[type=file] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }

    .btn-upload {
      background-color: var(--bg-light);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: 500;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-upload:hover {
      background-color: #edebe9;
    }

    .status-text {
      font-size: 0.9rem;
      color: #605e5c;
    }

    /* Main Content / Table Area */
    .table-container {
      flex: 1;
      overflow: auto;
      background-color: #e1dfdd;
      padding: 10px;
    }

    table {
      border-collapse: collapse;
      background-color: var(--cell-bg);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--cell-border);
      min-width: 100%;
    }

    th,
    td {
      border: 1px solid var(--cell-border);
      padding: 6px 10px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    th {
      background-color: var(--header-bg);
      font-weight: 600;
      color: #605e5c;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .row-number {
      background-color: var(--header-bg);
      color: #605e5c;
      font-weight: 500;
      text-align: center;
      position: sticky;
      left: 0;
      z-index: 1;
      width: 40px;
    }

    tbody tr:hover td {
      background-color: var(--cell-hover);
    }

    td.numeric {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #a19f9d;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #c8c6c4;
    }

    /* Loading Overlay */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-size: 16px;
      font-weight: 600;
      color: var(--excel-green);
    }

    .spinner {
      border: 5px solid #e1dfdd;
      border-top: 5px solid var(--excel-green);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Ribbon -->
  <div class="ribbon">
    <div class="ribbon-brand">
      <i class="fas fa-chart-pie"></i>
      Filter PDF Saham 5%
    </div>
    <a class="btn-ribbon" href="aplikasi.html"><i class="fas fa-arrow-left me-2"></i>Kembali ke Menu</a>
  </div>

  <!-- Info Bar -->
  <div class="info-bar">
    <i class="fas fa-info-circle"></i>
    <span>
      <strong>Info:</strong> Format PDF laporan dapat diambil dari link
      <a href="https://idx.co.id/id/perusahaan-tercatat/keterbukaan-informasi/" target="_blank"
        style="color: #005a9e; font-weight: 600;">Keterbukaan Informasi IDX</a>
      menggunakan opsi filter <strong>5%</strong>.
    </span>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="file-input-wrapper">
      <button class="btn-upload"><i class="fas fa-file-pdf text-danger"></i> Unggah PDF</button>
      <input type="file" id="pdfUpload" accept="application/pdf" />
    </div>
    <span class="status-text" id="fileName">Pilih file laporan kepemilikan saham (.pdf)</span>
  </div>

  <!-- Loading Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Membaca Data PDF, harap tunggu...</span>
  </div>

  <!-- Table Area -->
  <div class="table-container" id="output">
    <div class="empty-state">
      <i class="fas fa-file-pdf"></i>
      <h5>Data Kosong</h5>
      <p>Silakan upload file PDF Anda terlebih dahulu.</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

    const pdfUpload = document.getElementById('pdfUpload');
    const outputDiv = document.getElementById('output');
    const loadingDiv = document.getElementById('loading');
    const fileNameSpan = document.getElementById('fileName');

    pdfUpload.addEventListener('change', async function () {
      const file = this.files[0];
      if (!file) {
        fileNameSpan.textContent = "Pilih file laporan kepemilikan saham (.pdf)";
        return;
      }

      fileNameSpan.innerHTML = `<i class="fas fa-file-pdf text-danger"></i> ${file.name}`;

      outputDiv.innerHTML = "";
      loadingDiv.style.display = "flex";

      const fileReader = new FileReader();
      fileReader.onload = async function () {
        try {
          const typedArray = new Uint8Array(this.result);
          const pdf = await pdfjsLib.getDocument({ data: typedArray }).promise;
          const extracted = [];

          for (let pageNum = 2; pageNum <= pdf.numPages; pageNum++) {
            const page = await pdf.getPage(pageNum);
            const textContent = await page.getTextContent();
            const items = textContent.items.map(it => {
              const tr = it.transform;
              return { str: it.str.trim(), x: tr[4], y: tr[5] };
            }).filter(it => it.str.length > 0);

            const rows = groupByRows(items, 2.5);
            rows.forEach(row => {
              row.sort((a, b) => a.x - b.x);
              const tokens = row.map(t => t.str);
              const kode = extractKode(tokens);
              const perubahan = extractPerubahan(row);
              if (kode && perubahan !== null && perubahan !== 0) {
                extracted.push({ kode, perubahan: formatNumber(perubahan) });
              }
            });
          }
          renderTable(extracted);
        } catch (err) {
          console.error(err);
          outputDiv.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-exclamation-triangle text-danger"></i>
              <h5>Terjadi Kesalahan</h5>
              <p>Gagal membaca PDF. Pastikan file dalam format yang benar.</p>
            </div>`;
        } finally {
          loadingDiv.style.display = "none";
        }
      };
      fileReader.readAsArrayBuffer(file);
    });

    function groupByRows(items, yTol = 2.5) {
      const sorted = items.slice().sort((a, b) => (b.y - a.y) || (a.x - b.x));
      const rows = [];
      let current = [];
      for (let i = 0; i < sorted.length; i++) {
        if (current.length === 0) { current.push(sorted[i]); continue; }
        const lastY = current[0].y;
        if (Math.abs(sorted[i].y - lastY) <= yTol) current.push(sorted[i]);
        else { rows.push(current); current = [sorted[i]]; }
      }
      if (current.length) rows.push(current);
      return rows;
    }

    function extractKode(tokens) {
      for (let i = 0; i < Math.min(tokens.length, 6); i++) {
        const t = tokens[i];
        if (/^[A-Z]{3,6}$/.test(t)) return t;
      }
      return null;
    }

    // Ambil token paling kanan sebagai kolom perubahan
    function extractPerubahan(row) {
      if (!row || row.length === 0) return null;
      const rightmost = row[row.length - 1].str;
      if (rightmost === "-" || rightmost === "–") return null;
      return parseLocaleNumber(rightmost);
    }

    function parseLocaleNumber(s) {
      if (!s || s.trim() === "-" || s.trim() === "–") return null;
      let raw = s.replace(/[^\d.,+\-]/g, '').replace('%', '');
      if (!raw) return null;
      const hasComma = raw.includes(',');
      const hasDot = raw.includes('.');
      if (hasComma && !hasDot) {
        const parts = raw.split(',');
        raw = parts.length > 2 ? parts.join('') : raw.replace(',', '.');
      } else if (hasDot && !hasComma) {
        const parts = raw.split('.');
        if (parts.length > 2) raw = parts.join('');
      } else if (hasDot && hasComma) {
        raw = raw.replace(/,/g, '');
        const dots = (raw.match(/\./g) || []).length;
        if (dots > 1) raw = raw.replace(/\./g, '');
      }
      const val = parseFloat(raw);
      return Number.isFinite(val) ? val : null;
    }

    function formatNumber(n) {
      return n.toLocaleString('en-US');
    }

    function renderTable(data) {
      if (!data || data.length === 0) {
        outputDiv.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
              <h5 class="mt-3">Scan Selesai</h5>
              <p>Tidak ada perubahan kepemilikan saham ditemukan pada PDF tersebut.</p>
            </div>`;
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th style="width: 40px; z-index: 3;"></th>
              <th>Kode Efek</th>
              <th>Perubahan (%)</th>
            </tr>
          </thead>
          <tbody>
      `;
      data.forEach((row, idx) => {
        html += `
            <tr>
              <td class="row-number">${idx + 1}</td>
              <td>${row.kode}</td>
              <td class="numeric">${row.perubahan}</td>
            </tr>`;
      });
      html += `
          </tbody>
        </table>
      `;
      outputDiv.innerHTML = html;
    }
  </script>
</body>

</html>
