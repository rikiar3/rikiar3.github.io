<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lucky Spin - Varchar</title>

  <!-- Bootstrap CSS -->
  <link href="bootstrap5/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link href="fontawesome/css/all.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --neon-gold: #fbbf24;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 70%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }

    .spin-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .input-section {
      flex: 1;
      min-width: 300px;
    }

    .wheel-section {
      flex: 1;
      min-width: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    h2 {
      font-weight: 800;
      font-size: 2.5rem;
      color: var(--neon-gold);
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      color: #f8fafc;
      border-radius: 16px;
      padding: 15px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      resize: none;
      transition: all 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--neon-gold);
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
    }

    .btn-spin {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 32px;
      font-size: 1.2rem;
      font-weight: 800;
      width: 100%;
      margin-top: 20px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
    }

    .btn-spin:active {
      transform: scale(0.98);
    }

    .btn-spin:disabled {
      background: #475569;
      box-shadow: none;
      cursor: not-allowed;
    }

    .nav-back {
      display: inline-block;
      margin-top: 20px;
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-back:hover {
      color: white;
    }

    /* Wheel styling */
    .wheel-wrapper {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.5);
      border: 5px solid #1e293b;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      color: #ef4444;
      text-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .center-pin {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      background: #f8fafc;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      z-index: 5;
    }
  </style>
</head>

<body>

  <div class="spin-container">
    <div class="input-section">
      <h2><i class="fas fa-dharmachakra"></i> Lucky Spin</h2>
      <p style="color: #94a3b8; margin-bottom: 25px;">Masukkan nama, putar roda, dan tentukan pemenangnya!</p>

      <textarea id="nameList" placeholder="Masukkan nama peserta (1 per baris)..."></textarea>

      <button class="btn-spin" id="spinBtn" onclick="spinWheel()">Putar Roda!</button>
      <div style="text-align: center;">
        <a class="nav-back" href="aplikasi.html"><i class="fas fa-arrow-left"></i> Kembali</a>
      </div>
    </div>

    <div class="wheel-section">
      <div class="wheel-wrapper">
        <i class="fas fa-caret-down pointer"></i>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
        <div class="center-pin"></div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const center = canvas.width / 2;
    let names = [];
    let angleCurrent = 0;
    let spinning = false;

    // Modern color palette
    const colors = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];

    function drawWheel() {
      const input = document.getElementById("nameList").value.trim();
      names = input ? input.split("\n").map(n => n.trim()).filter(n => n) : [];
      const total = names.length || 1;
      const dummyNames = names.length ? false : true;
      const displayTotal = dummyNames ? 6 : total;

      const arc = 2 * Math.PI / displayTotal;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < displayTotal; i++) {
        const start = angleCurrent + i * arc;
        const end = start + arc;

        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, center, start, end);
        ctx.fill();

        // Border separator
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";
        ctx.font = "bold 22px 'Outfit', sans-serif";
        ctx.fillText(dummyNames ? "?" : names[i], center - 30, 8);
        ctx.restore();
      }
    }

    function easeOut(t, b, c, d) {
      t /= d;
      t--;
      return c * (t * t * t + 1) + b;
    }

    function spinWheel() {
      if (spinning) return;

      const input = document.getElementById("nameList").value.trim();
      names = input.split("\n").map(n => n.trim()).filter(n => n);

      if (names.length < 2) {
        alert("Masukkan minimal 2 nama peserta untuk diputar.");
        return;
      }

      spinning = true;
      document.getElementById("spinBtn").disabled = true;

      const spinTimeTotal = 10000;
      const spinAngleStart = Math.random() * 10 + 10;
      let spinTime = 0;

      function rotate() {
        spinTime += 30;
        if (spinTime >= spinTimeTotal) {
          spinning = false;
          document.getElementById("spinBtn").disabled = false;

          // Hitung pemenang
          const degrees = angleCurrent * 180 / Math.PI + 90;
          const arcDegrees = 360 / names.length;
          const index = Math.floor((360 - degrees % 360) % 360 / arcDegrees);
          const winner = names[index];

          setTimeout(() => {
            if (confirm(`🎉 Pemenangnya adalah: ${winner}!\n\nHapus ${winner} dari daftar?`)) {
              names.splice(index, 1);
              document.getElementById("nameList").value = names.join("\n");
              drawWheel();
            }
          }, 500);
          return;
        }

        const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
        angleCurrent += (spinAngle * Math.PI / 180);
        drawWheel();
        requestAnimationFrame(rotate);
      }

      rotate();
    }

    // Event listener untuk saat mengetik update wheel
    document.getElementById("nameList").addEventListener('input', () => {
      if (!spinning) drawWheel();
    });

    drawWheel();
  </script>
</body>

</html>
